{% extends "store/layouts/main.html" %}

{% block content %}

<section id="form " style="margin-left: 25%;"><!--form-->
    <div class="container">
        <div class="col-sm-4 col-sm-offset-1 ">

            <div class="signup-form"><!--sign up form-->
                <h2>Reset Password</h2>
                <form method="post">

                    {% csrf_token %}
                    {{ field.errors }}
                    {{form.email.label}}
                    {{form.email}}

                    <button type="submit" class="btn btn-default">Send Confirmation Link</button><br>                
                </form>
            </div><!--/sign up form-->

        </div>
        </div>
    </div>
</section><!--/form-->

{% endblock content %}
