{% extends "store/layouts/main.html" %}

{% block content %}

<section id="form"><!--form-->
    <div class="container d-flex align-items-center justify-content-center">
        <div class="row d-flex justify-content-center align-items-center">
            <div class="col-sm-4 col-sm-offset-1">
                <div class="login-form"><!--login form-->
                    <h2>Login to your account</h2>
                    <form method="post">
                        {% csrf_token %}
                        <input type="text" name="username" id="username" placeholder="Username" />
                        <input type="password" name="password" id="password" placeholder="Password" />
                        <!-- <span>
                            <input type="checkbox" class="checkbox" name="keep_logged_in" />
                            Keep me signed in
                        </span> -->
                        <button type="button" id="submit" class="btn btn-default">Login</button><br>

                        <ul class="error-list text-danger" style="padding: 0;">
                            {% for message in messages %}
                            {{message}}
                            {% endfor %}
                        </ul>

                        <span id="errormsg" style="color: red;"></span>

                        <div class="d-flex justify-content-center links">
                            Do not have an account?
                            <a href="{% url 'register' %}">Register</a>
                        </div>
                    </form>
                </div><!--/login form-->
            </div>
        </div>
    </div>
</section><!--/form-->

{% endblock content %}

{% block scripts %}
<script>
    // Login Validation

    $('#submit').click(() => {
        var username = $('#username').val()
        var password = $('#password').val()
        var data = {
            'csrfmiddlewaretoken': '{{csrf_token}}',
            'username': username,
            'password': password
        }
        if (username == '') {
            $('#errormsg').html('Enter valid username')
        } else if (password == '') {
            $('#errormsg').html('Enter valid password')
        } else {
            $.ajax({
                method: "POST",
                url: "login",
                data: data,
                dataType: "json",
                success: function (data) {
                    if (data.success) {
                        window.location.replace('/')
                    } else {
                        $('#errormsg').html('Invalid credentials')
                    }
                }
            });
        }
    })
</script>
{% endblock scripts %}
