{% extends 'store/layouts/main.html' %}
{% load static %}
{% block sidebar %}

{% endblock %}

{% block content %}
<div class="container">
  <div class="row d-flex flex-row product_data">
    <div class="col-4 text-center align-self-center">
      <img src="{% static 'images/a2.jpg' %}" alt="" style="width: 300px; height:auto;" />
    </div>
    <div class="col-8">
      <div class="row">
        <h6 class="fw-bold">Brand Name</h6>
        <h6>Product Name</h6>
        <hr />
      </div>
      <div class="row">
        <div class="col-6">
          <div class="row">
            <div>
              <i class="bi bi-star-fill text-warning"></i>
              <i class="bi bi-star-fill text-warning"></i>
              <i class="bi bi-star-fill text-warning"></i>
              <i class="bi bi-star"></i>
              <i class="bi bi-star"></i>
            </div>
          </div>
          <div class="row text-decoration-line-through text-secondary">
            <h6>MRP: ₹1200</h6>
          </div>
          <div class="row">
            <h5>QRP: ₹1110</h5>
          </div>
          <div class="row text-success">
            <h6>You save ₹90 OFF</h6>
          </div>
          <div class="row">
            <div class="col">
              {% csrf_token %}
              <input type="hidden" value="{{ product.id }}" class="prod_id">
              <label for="quantity">Quantity</label>
              <div class="input-group text-center mb-3" style="width: 130px;">
                <button class="input-group-text decrement-btn">-</button>
                <input type="text" name="quantity" class="form-control qty-input text-center" value="1">
                <button class="input-group-text increment-btn">+</button>
              </div>
            </div>
          </div>
          <br />
          <div class="row">
            <div>
              <a href="#" class="btn btn-success addToCartBtn">ADD TO CART</a>
            </div>
          </div>
        </div>
        <div class="col-6"></div>
      </div>
    </div>
  </div>
  <hr />
</div>
{% endblock %}
