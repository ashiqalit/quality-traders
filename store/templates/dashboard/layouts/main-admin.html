{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
    <meta name="description" content="POS - Bootstrap Admin Template">
    <meta name="keywords"
        content="admin, estimates, bootstrap, business, corporate, creative, management, minimal, modern,  html5, responsive">
    <meta name="author" content="Dreamguys - Bootstrap Admin Template">
    <meta name="robots" content="noindex, nofollow">
    <title>
        {% block title %}

        {% endblock title %}
    </title>
    {% block head %}

    {% endblock head %}
    <link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon.jpg">

    <link rel="stylesheet" href="{% static 'assets/css/bootstrap.min.css' %}">

    <link rel="stylesheet" href="{% static 'assets/css/animate.css' %}">

    <link rel="stylesheet" href="{% static 'assets/css/dataTables.bootstrap4.min.css' %}">

    <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/fontawesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/all.min.css' %}">

    <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
    
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/alertify.min.css" />
    <!-- Default theme -->
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/css/themes/default.min.css" />
</head>

<body>
    <div id="global-loader">
        <div class="whirly-loader"> </div>
    </div>

    {% include 'dashboard/includes/navbar.html' %}
    {% include 'dashboard/includes/sidebar.html' %}

    <div class="main-wrapper">

        {% block content %}

        {% endblock content %}

    </div>



    <script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>

    <script src="{% static 'assets/js/feather.min.js' %}"></script>

    <script src="{% static 'assets/js/jquery.slimscroll.min.js' %}"></script>

    <script src="{% static 'assets/js/jquery.dataTables.min.js' %}"></script>
    <script src="{% static 'assets/js/dataTables.bootstrap4.min.js' %}"></script>

    <script src="{% static 'assets/js/bootstrap.bundle.min.js' %}"></script>

    <script src="{% static 'assets/plugins/select2/js/select2.min.js' %}"></script>

    <script src="{% static 'assets/plugins/sweetalert/sweetalert2.all.min.js' %}"></script>
    <script src="{% static 'assets/plugins/sweetalert/sweetalerts.min.js' %}"></script>

    <script src="{% static 'assets/js/script.js' %}"></script>
    <script src="{% static 'assets/js/dash.js' %}"></script>
    <script src="//cdn.jsdelivr.net/npm/alertifyjs@1.13.1/build/alertify.min.js"></script>
    <script>
        alertify.set('notifier', 'position', 'top-right');
        {% for msg in messages %}
        alertify.success('{{msg}}')
        {% endfor %}
    </script>
    {% block script %}

    {% endblock script %}
</body>

</html>
